name: Race update

on:
  schedule:
    # Saturday 23:00 UTC — first attempt at refreshing the upcoming-race
    #   prediction. Runs ~6h after a typical European qualifying session.
    - cron: '0 23 * * 6'
    # Sunday 03:00 UTC — backup attempt for races with late-publishing
    #   qualifying data (Americas / Asia time zones, network lag at FastF1).
    - cron: '0 3 * * 0'
    # Monday 12:00 UTC — score the race that just happened.
    - cron: '0 12 * * 1'
  workflow_dispatch:
    inputs:
      force:
        description: 'Process even if last_processed already covers latest race'
        required: false
        default: 'false'

permissions:
  contents: write

concurrency:
  group: race-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Cache FastF1 data + parquet
        uses: actions/cache@v4
        with:
          # data/raw/        — FastF1 HTTP response cache (set by src/data_pipeline.enable_cache)
          # data/processed/  — all_races.parquet (built by fetch_historical_data, saves partial progress)
          path: |
            data/raw
            data/processed
          key: f1-data-${{ github.run_id }}
          restore-keys: |
            f1-data-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Process latest race + predict next
        env:
          FORCE_REPROCESS: ${{ github.event.inputs.force }}
        run: python scripts/race_update.py

      - name: Regenerate README sections
        run: python scripts/update_readme.py

      - name: Commit and push if changed
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/results/ README.md
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: update predictions and accuracy report [skip ci]"

          # Resilient push: if a human pushed something to main since our
          # checkout, rebase our single commit on top and try again. Up to
          # 3 attempts before giving up and failing the workflow.
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected on attempt $attempt — fetching latest main and rebasing."
            git fetch origin main
            git rebase origin/main
          done
          echo "Could not push after 3 attempts — failing the run."
          exit 1
